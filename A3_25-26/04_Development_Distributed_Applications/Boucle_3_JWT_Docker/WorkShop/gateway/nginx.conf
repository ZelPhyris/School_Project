# Déclaration des événements pour NGINX
events {
    worker_connections 1024; # Nombre maximum de connexions simultanées par worker
}

http {
    server {
        listen 80; # NGINX écoute sur le port 80
        server_name localhost; # Nom du serveur pour l'environnement local
        absolute_redirect off; # Redirections relatives : conserve l'hôte et le port (ex: :8080)

        # Route interne pour valider le token JWT
        location /authenticate {
            internal; # Accessible uniquement depuis NGINX, pas depuis l'extérieur

            proxy_pass_request_body off; # Ne pas transmettre le corps de la requête
            proxy_set_header Content-Length ""; # En-tête nécessaire car on ne transmet pas le body
            proxy_set_header X-Original-URI $request_uri; # Conserver l'URI originale pour logging ou suivi

            # Redirection vers le service d'authentification pour validation du token
            proxy_pass http://auth-service:3000/api/auth/validate;
        }

        # Route publique pour le login
        location /login {
            proxy_pass http://auth-service:3000/api/auth/login;
        }

        # Route publique pour l'enregistrement
        location /register {
            proxy_pass http://auth-service:3000/api/auth/register;
        }

        # Route privée : protégée par JWT
        location /private {
            # Force une sous-requête vers /authenticate (validation du token)
            # avant de laisser passer la requête vers le service privé.
            auth_request /authenticate;
            proxy_pass http://private-service:3000/api/;
        }

        # Route admin : l'auth-service applique lui-même authenticate + authorize("admin")
        location /users {
            proxy_pass http://auth-service:3000/api/auth/users;
        }

        # Accès direct à l'API de l'auth-service sous son préfixe réel (/api/...).
        # Permet au "Try it out" de Swagger de fonctionner via la gateway.
        # Les routes sensibles (validate, users) restent protégées par leurs
        # propres middlewares dans le service.
        location /api/ {
            proxy_pass http://auth-service:3000/api/;
        }

        # Documentation Swagger de l'auth-service (publique)
        location = /docs { return 301 /docs/; }
        location /docs/ {
            proxy_pass http://auth-service:3000/api/docs/;
        }
    }
}
